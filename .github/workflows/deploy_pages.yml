name: Deploy to GitHub Pages

on:
  # Deploye wenn sich Daten im Frontend-Ordner ändern
  push:
    branches: [main]
    paths:
      - 'frontend/**'

  # Manuell auslösbar
  workflow_dispatch:

# Permissions für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Frontend-Ordner als Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend'

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
